version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Inject console environment variables into .env.production so they are available to Next.js SSR at runtime
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production
        - echo "DIRECT_DATABASE_URL=$DIRECT_DATABASE_URL" >> .env.production
        - echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> .env.production
        - echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.production
        - echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env.production
        - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env.production
        - echo "MAILERSEND_API_KEY=$MAILERSEND_API_KEY" >> .env.production
        - echo "MAILERSEND_FROM_ADDRESS=$MAILERSEND_FROM_ADDRESS" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
